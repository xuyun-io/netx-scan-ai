version: "1"
actions:
  validator_overview:
    description: 从链上读取注册验证者、活跃集合、jail 状态、StakeCredit、余额、近期出块，生成验证者总览。
    readonly: true
    approval: false
    timeoutSeconds: 90
    command: scripts/validator-overview.sh
    args:
      - validator_overview
      - ${sample}

  validator_block_stats:
    description: 统计最近 N 个块中每个活跃验证者的出块数量，识别漏块节点。
    readonly: true
    approval: false
    timeoutSeconds: 90
    command: scripts/validator-block-stats.sh
    args:
      - validator_block_stats
      - ${sample}

  validator_rewards:
    description: 读取每个已注册验证者的 StakeCredit Pool 总额，计算累计奖励。
    readonly: true
    approval: false
    timeoutSeconds: 60
    command: scripts/validator-rewards.sh
    args:
      - validator_rewards

  validator_jailed_status:
    description: 检查每个已注册验证者是否处于活跃、被 jail 或未入集状态。
    readonly: true
    approval: false
    timeoutSeconds: 60
    command: scripts/validator-jailed-status.sh
    args:
      - validator_jailed_status

  validator_window_stats:
    description: 使用二分窗口定位和批量 RPC 统计块区间内各验证者出块、tx、gasUsed、operator 余额变化。
    readonly: true
    approval: false
    timeoutSeconds: 120
    command: scripts/validator-window-stats.sh
    args:
      - validator_window_stats
      - ${window_sec}
      - ${from_block}
      - ${to_block}
