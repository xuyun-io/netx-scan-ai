---
kind: "Deployment"
apiVersion: "apps/v1"
metadata:
  name: "netx-scan-ai"
  namespace: "nss"
  labels:
    app: "netx-scan-ai"
  annotations:
    deployment.k8s.kubestar.io/cluster: "prod-web3-netx-tokyo-eks"
    deployment.k8s.kubestar.io/region: "ap-northeast-1"
    deployment.k8s.kubestar.io/vendor: "ProviderAWS"
    deployment.kubernetes.io/revision: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: "netx-scan-ai"
  template:
    metadata:
      labels:
        app: "netx-scan-ai"
    spec:
      containers:
        - name: "netx-scan-ai"
          image: "654654578710.dkr.ecr.ap-northeast-1.amazonaws.com/xuyun-io/netx-scan-ai:main-sync-202607031800-1fc573ec-amd64"
          ports:
            - name: "port1"
              containerPort: 8080
              protocol: "TCP"
          resources:
            limits:
              cpu: "1"
              memory: "1G"
            requests:
              cpu: "100m"
              memory: "500M"
          volumeMounts:
            - name: data
              mountPath: /app/data
          terminationMessagePath: "/dev/termination-log"
          terminationMessagePolicy: "File"
          imagePullPolicy: "IfNotPresent"
      restartPolicy: "Always"
      terminationGracePeriodSeconds: 30
      dnsPolicy: "ClusterFirst"
      securityContext: {}
      schedulerName: "default-scheduler"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: netx-scan-ai-data
  strategy:
    type: "RollingUpdate"
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 3
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
