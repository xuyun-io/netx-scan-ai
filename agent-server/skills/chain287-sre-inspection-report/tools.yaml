version: "1"
actions:
  render_report:
    description: Render a professional Chain287 SRE HTML inspection report exclusively from real upstream results in the current invocation trace. Requires report_ref; never uses sample or model-authored data.
    readonly: true
    approval: false
    timeoutSeconds: 30
    command: python3
    args:
      - scripts/render-report.py
      - render_report
      - ""
      - ${report_ref}
      - ${report_title}
      - ${report_scope}
      - ${report_notes}
