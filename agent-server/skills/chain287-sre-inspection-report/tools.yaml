version: "1"
actions:
  run_inspection:
    description: Run the complete Chain287 SRE inspection in one deterministic workflow, require all nine read-only checks to succeed, and generate the HTML report artifact.
    readonly: true
    approval: false
    timeoutSeconds: 180
    command: python3
    args:
      - scripts/run-inspection.py
      - ${sample}
      - ${count}
      - ${window_sec}
      - ${report_title}
      - ${report_scope}
      - ${report_notes}
